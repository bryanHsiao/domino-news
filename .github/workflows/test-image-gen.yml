name: Test image gen (diagnostic)

# One-off diagnostic — manually triggered. Tests whether gpt-image-1 is
# down or whether our larger/higher-quality request times out.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci --no-audit --no-fund
      - run: npx tsx scripts/test-image-gen.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
