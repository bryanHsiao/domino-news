name: Gen one cover (one-off)

# One-off, manually triggered: generate the notes-view-column cover with a
# short prompt and commit it if generation succeeds. Remove after use.
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_FOR_PUBLISH }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci --no-audit --no-fund
      - run: npx tsx scripts/gen-one-cover.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Commit and push
        run: |
          git config user.name "bryan hsiao"
          git config user.email "24813223+bryanHsiao@users.noreply.github.com"
          git add public/covers src/content/posts
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Add notes-view-column cover (one-off short-prompt generation)"
            git push origin main
          fi
