name: Daily Article

on:
  schedule:
    # 每天 23:00 UTC (台灣時間 07:00) 觸發
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
        run: npm run generate:article

      - name: Upload rejected drafts (always)
        if: always() && hashFiles('_drafts/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: rejected-drafts-${{ github.run_id }}
          path: _drafts/
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit rejected drafts to _drafts/ (on failure)
        if: failure() && hashFiles('_drafts/*.md') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _drafts/
          if git diff --cached --quiet; then
            echo "No drafts to commit."
            exit 0
          fi
          DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
          git commit -m "Save rejected drafts ($DATE) — needs manual salvage"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed drafts on attempt $attempt"
              exit 0
            fi
            echo "Draft push rejected (attempt $attempt) — pulling and retrying..."
            git pull --rebase
          done
          echo "Draft push still failing after 3 attempts."
          exit 1

      - name: Commit and push (race-safe)
        id: commit
        if: steps.generate.outputs.published == 'true'
        env:
          FALLBACK: ${{ steps.generate.outputs.fallback }}
          FALLBACK_REASON: ${{ steps.generate.outputs.fallback_reason }}
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts public/covers
          if git diff --cached --quiet; then
            echo "No new article to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
          if [ "$FALLBACK" = "true" ]; then
            MSG="Add daily article ($DATE) [fallback: $FALLBACK_REASON]"
          else
            MSG="Add daily article ($DATE)"
          fi
          git commit -m "$MSG"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — pulling and retrying..."
            git pull --rebase
          done
          echo "Push still failing after 3 attempts."
          exit 1

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
