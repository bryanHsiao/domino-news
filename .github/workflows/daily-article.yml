name: Daily Article

on:
  schedule:
    # 每天 00:30 UTC (台灣時間 08:30) 觸發
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: npm run generate:article

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts public/covers
          if git diff --cached --quiet; then
            echo "No new article to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "Add daily article ($DATE)"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
