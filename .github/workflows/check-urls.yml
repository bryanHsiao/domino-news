name: Check Post URLs

on:
  schedule:
    # 每週日 23:00 UTC (台灣週一 07:00) — 跟 daily-article 同時段，但沒衝突
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit every URL in every published post
        run: npm run check:urls
