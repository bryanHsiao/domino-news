name: Backfill Covers

on:
  workflow_dispatch:
    inputs:
      force_regen:
        description: 'Regenerate covers for posts that already have one'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: backfill-covers
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backfill
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1' }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY || 'medium' }}
          FORCE_REGEN: ${{ inputs.force_regen && '1' || '0' }}
        run: npm run backfill:covers

      - name: Commit and push (race-safe)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts public/covers
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Backfill cover images"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — pulling and retrying..."
            git pull --rebase
          done
          echo "Push still failing after 3 attempts."
          exit 1

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
